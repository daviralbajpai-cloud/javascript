<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>AVIRAL BAJPAI</h1>
    <button id="start">START</button>
    <button id="stop">STOP</button>
</body>
<script>
let isstopped = false
const startPrinting = document.querySelector('#start').addEventListener('click',function(){
    isstopped = false 
    setInterval(function(){
        if(!isstopped)
        addtext = document.createElement('h2')
        addtext.innerHTML="hello"
        document.body.appendChild(addtext)
    },1000)
})

const stopPrinting = document.querySelector('#stop').addEventListener('click',function(){
isstopped=true
     
})
    
</script>
</html>
