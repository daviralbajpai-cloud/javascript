<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: rgb(55, 55, 66);">
    <h1 style="color: aliceblue;">clicking start changes color every seconds</h1>
    <button style="color: rgb(7, 244, 7);" id="start">START</button>
    <button style="color: rgb(241, 10, 10);" id="stop">STOP</button>
    
</body>
<script>
  let intervalid
  const randomColor = function(){
    const hex = "0123456789ABCDEF"
    let color = '#';
    for(let i=0;i<6;i++){
      color += hex[Math.floor(Math.random() * 16)]
    }
    return color;
  };
  const startchangingColor = function(){
  
    intervalid= setInterval(changeBGcolor,1000);

    function changeBGcolor(){
      document.body.style.backgroundColor = randomColor();
    }
   
  };
  
  const stopchangingColor = function(){
    clearInterval(intervalid)
    
  }

  document.querySelector('#start').addEventListener('click',startchangingColor);
  document.querySelector('#stop').addEventListener('click',stopchangingColor);
  

</script>
</html>
