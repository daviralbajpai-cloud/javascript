<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: black; color: white">
    <script>
    const div = document.createElement('div'); // Create a new div element
    console.log(div); // 
    div.className = 'main'; // Set the class name of the div to 'main'
    div.id ='myid'; // Set the id of the div to 'myid'
    div.style.color = 'red'; 
    const text = document.createTextNode('Hello World'); // Create a text node with the content 'Hello World'
    div.appendChild(text); // Append the text node to the div
    document.body.appendChild(div); // Append the div to the body of the document
    </script>
    
</body>
</html>
