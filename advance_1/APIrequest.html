<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: rgb(69, 74, 73);">
    <ol>
        <li>0 UNSENT- client has been created. open() not called yet</li>
        <li>1 OPENED- open() has been called.</li>
        <li>2 HEADER_RECIEVED- send() has been called,and header and status are available</li>
        <li>3 LOADING- Downlaoding, responseText holds partial data.</li>
        <li>4 DONE- the opertaion is complete </li>
    </ol>
    
</body>
<script>
    const requestURL = 'https://api.github.com/users/daviralbajpai-cloud'
    const xhr = new XMLHttpRequest();
    xhr.open('GET',requestURL)
    xhr.onreadystatechange= function(){   
        console.log(xhr.readyState);
        if(xhr.readyState===4){
            const data= JSON.parse(this.responseText)
            console.log(data.followers)
        } 
    }
    xhr.send()
</script>
</html>
